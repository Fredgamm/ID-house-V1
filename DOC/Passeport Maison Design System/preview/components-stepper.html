<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Stepper + progress</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  .h { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  .h .t { font-size: 13px; font-weight: 700; }
  .h .r { font-size: 11px; color: var(--t2); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .panel { display: flex; flex-direction: column; gap: 8px; }
  .panel .lab { font-size: 10px; color: var(--t3); font-family: ui-monospace, monospace; }

  .step { display: inline-flex; align-items: center; background: #F7F7FD; border: 1px solid #E0DEF7; border-radius: 999px; padding: 2px; }
  .step button { width: 30px; height: 30px; border: 0; background: transparent; border-radius: 999px; cursor: pointer; color: #4D5461; font-size: 18px; line-height: 1; }
  .step .val { min-width: 40px; text-align: center; font-size: 14px; font-weight: 700; color: #7065F0; }
  .step.zero .val { color: #6C727F; font-weight: 600; }

  .dots { display: flex; gap: 6px; align-items: center; }
  .dots .d { width: 8px; height: 8px; border-radius: 50%; background: #E0DEF7; transition: all 200ms; }
  .dots .d.active { width: 20px; background: #7065F0; border-radius: 4px; }

  .stat { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; padding: 12px; background: #F7F7FD; border-radius: 10px; border: 1px solid #E0DEF7; }
  .stat .v { font-size: 20px; font-weight: 700; color: #000929; }
  .stat .k { font-size: 11px; color: #6B7280; }

  .bar { height: 5px; border-radius: 3px; background: #E0DEF7; overflow: hidden; }
  .bar .f { height: 100%; background: #16A34A; }
</style>
</head>
<body>
  <div class="h"><span class="t">Stepper · dots · stats · progress</span><span class="r">stepper 0 = gray · &gt;0 = primary bold</span></div>

  <div class="grid">
    <div class="panel">
      <span class="lab">STEPPER · valeur = 0</span>
      <div class="step zero"><button>−</button><span class="val">0</span><button>+</button></div>
      <span class="lab">STEPPER · valeur &gt; 0</span>
      <div class="step"><button>−</button><span class="val">3</span><button>+</button></div>
    </div>

    <div class="panel">
      <span class="lab">ONBOARDING DOTS</span>
      <div class="dots"><span class="d"></span><span class="d active"></span><span class="d"></span><span class="d"></span></div>
      <span class="lab">CONFIDENCE PROGRESS</span>
      <div class="bar"><div class="f" style="width:78%"></div></div>
      <span style="font-size:11px;color:#6B7280">78 % de confiance</span>
    </div>

    <div class="panel">
      <span class="lab">STAT BOX</span>
      <div class="stat"><span class="v">14</span><span class="k">Équipements</span></div>
      <div class="stat"><span class="v">428 500 €</span><span class="k">Patrimoine total</span></div>
    </div>
  </div>
</body>
</html>
