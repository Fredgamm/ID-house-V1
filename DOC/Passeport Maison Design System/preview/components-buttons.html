<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Buttons</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  .h { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .h .t { font-size: 13px; font-weight: 700; color: #000929; }
  .h .r { font-size: 11px; color: #6C727F; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 10px; }
  .btn {
    border: 0; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 16px; font-weight: 700;
    border-radius: 8px;
    padding: 12px 24px;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    transition: opacity 150ms ease;
    height: 48px;
  }
  .btn:hover { opacity: 0.85; }
  .btn-sm { font-size: 14px; padding: 10px 18px; height: 40px; }
  .btn-lg { font-size: 16px; padding: 16px 28px; height: 56px; }
  .btn-primary { background: #7065F0; color: #FFFFFF; }
  .btn-secondary { background: #F0EFFB; color: #000929; }
  .btn-outline { background: transparent; color: #7065F0; border: 1.5px solid #E0DEF7; }
  .btn-destructive { background: #DC2626; color: #FFFFFF; }
  .btn-ghost { background: transparent; color: #7065F0; }
  .btn-disabled { background: #E0DEF7; color: #9EA3AE; cursor: not-allowed; }
  .btn-loading { background: #7065F0; color: #FFFFFF; opacity: 0.8; }
  .spin { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #FFFFFF; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .lab { font-size: 10px; color: #6C727F; width: 70px; font-family: ui-monospace, monospace; }
</style>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="h"><span class="t">Buttons</span><span class="r">radius 8 · 48px default · 16/700 label · 5 variants</span></div>

  <div class="row">
    <span class="lab">medium</span>
    <button class="btn btn-primary"><i data-lucide="plus"></i>Inscription</button>
    <button class="btn btn-secondary">Plus tard</button>
    <button class="btn btn-outline">Voir plus</button>
    <button class="btn btn-destructive">Supprimer</button>
    <button class="btn btn-ghost">Annuler</button>
  </div>

  <div class="row">
    <span class="lab">small 40</span>
    <button class="btn btn-sm btn-primary">Ajouter</button>
    <button class="btn btn-sm btn-secondary">Filtrer</button>
    <button class="btn btn-sm btn-outline">Détails</button>
  </div>

  <div class="row">
    <span class="lab">large 56</span>
    <button class="btn btn-lg btn-primary">Parcourir les pros</button>
    <button class="btn btn-lg btn-outline">Trouver un artisan</button>
  </div>

  <div class="row">
    <span class="lab">states</span>
    <button class="btn btn-sm btn-disabled">Désactivé</button>
    <button class="btn btn-sm btn-loading"><span class="spin"></span>Chargement…</button>
  </div>
  <script>lucide.createIcons({attrs:{width:18,height:18,'stroke-width':2}});</script>
</body>
</html>
