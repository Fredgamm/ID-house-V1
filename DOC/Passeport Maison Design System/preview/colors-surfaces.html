<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Surfaces light + dark</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  body { padding: 0; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; min-height: 220px; }
  .pane { padding: 18px; display: flex; flex-direction: column; gap: 8px; position: relative; }
  .pane .head { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
  .pane.light { background: #F7F7FD; }
  .pane.light .head { color: #6C727F; }
  .pane.dark  { background: #100A55; }
  .pane.dark  .head { color: #CBC7FA; }
  .row { display: flex; align-items: center; gap: 10px; }
  .chip { padding: 6px 10px; border-radius: 8px; font-size: 11px; font-family: ui-monospace, monospace; font-weight: 600; }
  .light .chip-card { background: #FFFFFF; color: #000929; border: 1.5px solid #E0DEF7; box-shadow: 0 1px 2px rgba(0,9,41,0.04); }
  .light .chip-input { background: #F7F7FD; color: #4D5461; border: 1.5px solid #E0DEF7; }
  .light .chip-muted { background: #F0EFFB; color: #4D5461; }
  .light .chip-overlay { background: rgba(0,9,41,0.5); color: #FFFFFF; }
  .dark .chip-card { background: #100A55; color: #FFFFFF; border: 1.5px solid #2516DF; }
  .dark .chip-input { background: #1A1480; color: #CBC7FA; border: 1.5px solid #2516DF; }
  .dark .chip-muted { background: #1A1480; color: #CBC7FA; }
  .dark .chip-overlay { background: rgba(0,0,0,0.7); color: #FFFFFF; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="pane light">
      <div class="head">Light surfaces</div>
      <span class="chip chip-card">surface-card · #FFFFFF</span>
      <span class="chip chip-input">surface-input · #F7F7FD</span>
      <span class="chip chip-muted">surface-muted · #F0EFFB</span>
      <span class="chip chip-overlay">overlay · rgba(0,9,41,.5)</span>
    </div>
    <div class="pane dark">
      <div class="head">Dark surfaces</div>
      <span class="chip chip-card">surface-card · #100A55</span>
      <span class="chip chip-input">surface-input · #1A1480</span>
      <span class="chip chip-muted">surface-muted · #1A1480</span>
      <span class="chip chip-overlay">overlay · rgba(0,0,0,.7)</span>
    </div>
  </div>
</body>
</html>
