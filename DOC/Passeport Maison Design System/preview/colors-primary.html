<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Primary scale</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 0; border-radius: 8px; overflow: hidden; border: 1.5px solid var(--border); }
  .step { height: 88px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 6px; gap: 2px; }
  .step .w { font-size: 10px; font-weight: 700; font-family: ui-monospace, monospace; }
  .step .h { font-size: 9px; font-family: ui-monospace, monospace; opacity: 0.8; }
  .light-text { color: rgba(0,9,41,0.85); }
  .light-text .h { color: rgba(0,9,41,0.55); }
  .dark-text { color: rgba(255,255,255,0.95); }
  .dark-text .h { color: rgba(255,255,255,0.7); }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .head .t { font-size: 13px; font-weight: 700; color: #000929; }
  .head .ref { font-size: 11px; color: #6C727F; font-family: ui-monospace, monospace; }
</style>
</head>
<body>
  <div class="head">
    <span class="t">Primary · Violet confiance</span>
    <span class="ref">600 → #7065F0</span>
  </div>
  <div class="scale">
    <div class="step light-text" style="background:#F7F7FD"><span class="w">50</span><span class="h">F7F7FD</span></div>
    <div class="step light-text" style="background:#F0EFFB"><span class="w">100</span><span class="h">F0EFFB</span></div>
    <div class="step light-text" style="background:#E0DEF7"><span class="w">200</span><span class="h">E0DEF7</span></div>
    <div class="step light-text" style="background:#CBC7FA"><span class="w">300</span><span class="h">CBC7FA</span></div>
    <div class="step dark-text"  style="background:#A8A2F6"><span class="w">400</span><span class="h">A8A2F6</span></div>
    <div class="step dark-text"  style="background:#8A82F2"><span class="w">500</span><span class="h">8A82F2</span></div>
    <div class="step dark-text"  style="background:#7065F0"><span class="w">600</span><span class="h">7065F0</span></div>
    <div class="step dark-text"  style="background:#5245ED"><span class="w">700</span><span class="h">5245ED</span></div>
    <div class="step dark-text"  style="background:#2516DF"><span class="w">800</span><span class="h">2516DF</span></div>
    <div class="step dark-text"  style="background:#100A55"><span class="w">900</span><span class="h">100A55</span></div>
    <div class="step dark-text"  style="background:#0E0854"><span class="w">950</span><span class="h">0E0854</span></div>
  </div>
</body>
</html>
