<!-- @dsCard group="Spacing" -->
<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Spacing scale</title>
<link rel="stylesheet" href="_base.css"/>
<style>
  .h { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .h .t { font-size: 13px; font-weight: 700; }
  .h .r { font-size: 11px; color: var(--t2); font-family: ui-monospace, monospace; }
  .grid { display: grid; grid-template-columns: repeat(14, minmax(0,1fr)); gap: 8px; align-items: end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { width: 100%; background: #F0EFFB; border: 1px solid #CBC7FA; border-radius: 4px; }
  .lab { font-size: 10px; color: var(--t2); font-family: ui-monospace, monospace; }
</style>
</head>
<body>
  <div class="h"><span class="t">Spacing — base 4px</span><span class="r">page 20 · card 16 · sec-gap 14 · div-gap 8</span></div>
  <div class="grid">
    <div class="col"><div class="bar" style="height:2px"></div><span class="lab">2</span></div>
    <div class="col"><div class="bar" style="height:4px"></div><span class="lab">4</span></div>
    <div class="col"><div class="bar" style="height:6px"></div><span class="lab">6</span></div>
    <div class="col"><div class="bar" style="height:8px"></div><span class="lab">8</span></div>
    <div class="col"><div class="bar" style="height:10px"></div><span class="lab">10</span></div>
    <div class="col"><div class="bar" style="height:12px"></div><span class="lab">12</span></div>
    <div class="col"><div class="bar" style="height:14px"></div><span class="lab">14</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span class="lab">16</span></div>
    <div class="col"><div class="bar" style="height:20px"></div><span class="lab">20</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span class="lab">24</span></div>
    <div class="col"><div class="bar" style="height:28px"></div><span class="lab">28</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span class="lab">32</span></div>
    <div class="col"><div class="bar" style="height:40px"></div><span class="lab">40</span></div>
    <div class="col"><div class="bar" style="height:48px"></div><span class="lab">48</span></div>
  </div>
</body>
</html>
